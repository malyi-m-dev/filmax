name: Android Build → Telegram

# Собирает debug-APK и присылает его в Telegram.
# Запуск: пуш в ветку TV/мастер либо вручную (Actions → Run workflow).
on:
  push:
    branches: [ claude/android-tv, master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      module:
        description: "Gradle-модуль для сборки (например :app-tv или :app)"
        default: ":app-tv"
        type: string

permissions:
  contents: read

jobs:
  # Gate на PR: статический анализ detekt + проверка формата (detekt-formatting → ktlint, official).
  detekt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # detekt включает detekt-formatting (ktlint) — единый прогон покрывает
      # и статический анализ, и проверку форматирования. Бейзлайн пропускает
      # существующий код; новые нарушения валят сборку.
      - name: Run detekt + format check
        run: ./gradlew detekt --stacktrace

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: "**/build/reports/detekt/*.html"
          if-no-files-found: ignore

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Android SDK предустановлен на ubuntu-раннере (ANDROID_HOME уже задан,
      # platform-35/build-tools на месте, лицензии приняты). Отдельный
      # setup-android убран — он флакал на скачивании устаревшего «SDK Tools».

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Locate APK
        id: apk
        run: |
          path=$(find . -path '*/outputs/apk/debug/*.apk' | head -n1)
          if [ -z "$path" ]; then echo "APK not found" >&2; exit 1; fi
          echo "path=$path" >> "$GITHUB_OUTPUT"
          echo "Found APK: $path ($(du -h "$path" | cut -f1))"

      # Артефакт — надёжный запасной путь (доступен даже если Telegram не сработал).
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: filmax-debug-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      # Ветка-источник, краткое содержание коммита и ссылка на связанную задачу борда.
      # Считаем один раз и переиспользуем в уведомлениях ниже. Корректно работает
      # для push, pull_request (без артефактов "<n>/merge") и workflow_dispatch.
      - name: Resolve commit info
        id: commit
        env:
          # push → сообщение есть в событии; PR → берём заголовок PR; иначе — subject HEAD.
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          # Реальная ветка-источник: для PR это head_ref (а не "<n>/merge"); иначе — ref_name.
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          # Реальный head-коммит: для PR это head.sha (а не synthetic merge-коммит).
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [ -n "$HEAD_COMMIT_MESSAGE" ]; then
            commit_subject=$(printf '%s\n' "$HEAD_COMMIT_MESSAGE" | head -n1)
          elif [ -n "$PR_TITLE" ]; then
            commit_subject="$PR_TITLE"
          else
            commit_subject=$(git log -1 --pretty=%s)
          fi
          # Номер задачи (#N) ищем в сообщении коммита, заголовке и теле PR: Closes #N, (#N) и т.п.
          # `|| true` — без совпадения grep вернёт 1 и уронит шаг под `set -e -o pipefail`.
          issue_number=$(printf '%s' "$HEAD_COMMIT_MESSAGE $PR_TITLE $PR_BODY" | grep -oE '#[0-9]+' | head -n1 | tr -d '#' || true)
          if [ -n "$issue_number" ]; then
            task_url="https://github.com/malyi-m-dev/filmax/issues/${issue_number}"
            task_text="задача #${issue_number}"
          else
            task_url="https://github.com/users/malyi-m-dev/projects/1"
            task_text="доска проекта"
          fi
          short_sha=$(printf '%s' "$HEAD_SHA" | cut -c1-8)
          # subject гарантированно однострочный — безопасно для формата name=value.
          {
            echo "subject=${commit_subject}"
            echo "branch=${BRANCH_NAME}"
            echo "short_sha=${short_sha}"
            echo "task_url=${task_url}"
            echo "task_text=${task_text}"
          } >> "$GITHUB_OUTPUT"
          echo "Branch: ${BRANCH_NAME} | Commit ${short_sha}: ${commit_subject}"
          echo "Task: ${task_text} -> ${task_url}"

      # Одно уведомление: APK с подписью (ветка, коммит, кликабельная ссылка на задачу —
      # Telegram сам линкует URL). Только на pull_request и ручной запуск; на push/мерж
      # в master Telegram не дёргаем, чтобы не дублировать и не спамить.
      - name: Send APK to Telegram
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Подставляем ветку, краткое содержание коммита и ссылку на задачу в caption.
          BRANCH: ${{ steps.commit.outputs.branch }}
          SHORT_SHA: ${{ steps.commit.outputs.short_sha }}
          COMMIT_SUBJECT: ${{ steps.commit.outputs.subject }}
          TASK_URL: ${{ steps.commit.outputs.task_url }}
          TASK_TEXT: ${{ steps.commit.outputs.task_text }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::Секреты TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID не заданы — пропускаю отправку. APK доступен в Artifacts."
            exit 0
          fi
          apk="${{ steps.apk.outputs.path }}"
          # Лимит Bot API на отправку файла — 50 МБ.
          size_mb=$(( $(stat -c%s "$apk") / 1048576 ))
          # Telegram сам делает ссылку из URL — в caption кладём её обычным текстом.
          caption=$(printf 'Filmax · debug APK\nВетка: %s · Run #%s\nКоммит %s: %s\nЗадача: %s — %s' "$BRANCH" "$GITHUB_RUN_NUMBER" "$SHORT_SHA" "$COMMIT_SUBJECT" "$TASK_TEXT" "$TASK_URL")
          if [ "$size_mb" -ge 50 ]; then
            echo "::warning::APK ${size_mb}MB ≥ 50MB — Telegram-бот не примет файл. Возьми APK из Artifacts."
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=Сборка готова (${size_mb}MB), но превышает лимит Telegram 50MB. Скачай из GitHub Actions → Artifacts. ($BRANCH, $SHORT_SHA)"
            exit 0
          fi
          curl -sS -f -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F document=@"${apk}" \
            -F caption="$caption"
          echo "APK отправлен в Telegram."
