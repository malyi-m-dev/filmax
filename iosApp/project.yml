# XcodeGen-спецификация приложений Filmax (iOS + tvOS).
# На Mac: `brew install xcodegen` → в папке iosApp `xcodegen generate` → откроется Filmax.xcodeproj.
# Два app-таргета в одном проекте, оба линкуют общий KMP-фреймворк Shared:
#   • Filmax       — iPhone/iPad (sources: Shared + iOS)
#   • Filmax-tvOS  — Apple TV    (sources: Shared + tvOS)
# ViewModel'и (Shared/) переиспользуются обоими; различаются только View.
name: Filmax
options:
  bundleIdPrefix: com.filmax
  deploymentTarget:
    iOS: "16.0"    # NavigationStack/navigationDestination — рутовая навигация (issue #46)
    tvOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "" # ← подставь свой Team ID на Mac для запуска на устройстве

# Общий шаг сборки KMP-фреймворка: embedAndSignAppleFrameworkForXcode собирает Shared
# под нужную платформу/архитектуру ($PLATFORM_NAME → iphoneos/appletvos/…-simulator).
targetTemplates:
  FilmaxApp:
    type: application
    settings:
      base:
        PRODUCT_NAME: Filmax
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Filmax
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - Shared
    preBuildScripts:
      - name: "Build KMP Shared framework"
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode \
            -Pkotlin.native.cocoapods.platform=$PLATFORM_NAME \
            -Pkotlin.native.cocoapods.archs="$ARCHS" \
            -Pkotlin.native.cocoapods.configuration=$CONFIGURATION

targets:
  Filmax:            # iPhone / iPad
    templates: [FilmaxApp]
    platform: iOS
    sources:
      - path: Shared
      - path: iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.filmax.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad

  Filmax-tvOS:       # Apple TV
    templates: [FilmaxApp]
    platform: tvOS
    sources:
      - path: Shared
      - path: tvOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.filmax.app.tv
        TARGETED_DEVICE_FAMILY: "3" # tvOS
